<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kiosco - Tu Tienda</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo-link" style="text-decoration: none;">
            <div class="logo">
                <h1>🛒 Kiosco</h1>
                <p>Tu tienda de confianza</p>
            </div>
        </a>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div class="theme-toggle" id="themeToggle">
                <span>☀️</span>
                <div class="toggle-switch"></div>
                <span>🌙</span>
            </div>
            <button id="adminAccessBtn" class="btn-admin">👑 Admin</button>
        </div>
    </header>

    <div class="welcome-banner">
        <p>✨ ¡Bienvenido! Explora nuestros productos y haz tu pedido ✨</p>
    </div>

    <main>
        <aside id="categoriesSidebar">
            <h2>📂 Categorías</h2>
            <div id="categoriesList" class="categories-list"></div>
        </aside>

        <section id="productsSection">
            <div class="section-header">
                <h2 id="currentCategoryTitle">Productos</h2>
                <div class="search-box">
                    <input type="text" id="searchProducts" placeholder="Buscar productos...">
                </div>
            </div>
            <div id="productsGrid" class="products-grid"></div>
        </section>
    </main>

    <button id="cartFab" class="cart-fab">
        🛒
        <span id="cartBadge" class="badge">0</span>
    </button>

    <div id="cartModal" class="cart-modal">
        <div class="cart-modal-content">
            <div class="cart-header">
                <h3>🛍️ Mi Carrito</h3>
                <span class="close-cart">&times;</span>
            </div>
            <div id="cartItemsList" class="cart-items-list"></div>
            <div class="cart-total">
                <strong>Total: S/ <span id="cartTotal">0.00</span></strong>
            </div>
            <button id="checkoutBtn" class="btn-primary">📱 Enviar por WhatsApp</button>
        </div>
    </div>

    <div id="toastNotification" class="toast"></div>

    <script src="js/database.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
