<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kiosco - Panel de Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ============ TEMAS CLARO/OSCURO ============ */
        :root {
            --bg-primary: #f0f9ff;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 16px;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: #1e293b;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        body {
            font-family: 'Inter', system-ui, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Header */
        .admin-header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-link {
            text-decoration: none;
            cursor: pointer;
        }

        .logo-link h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-link p {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Toggle Claro/Oscuro */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            background: var(--bg-primary);
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: var(--primary);
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: all 0.3s ease;
        }

        body.dark-mode .toggle-switch::before {
            transform: translateX(22px);
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .view-store-btn {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Login - Número oculto */
        .admin-login {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            max-width: 400px;
            margin: 3rem auto;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
            margin: 1rem 0;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
        }

        .hidden-number {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            padding: 0.5rem;
            background: var(--bg-primary);
            border-radius: 8px;
            display: inline-block;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .stat-icon {
            font-size: 2rem;
        }

        .stat-info h3 {
            font-size: 1.8rem;
            color: var(--primary);
        }

        /* Sections */
        .admin-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .section-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .form-control {
            padding: 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            flex: 1;
            min-width: 150px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .product-item, .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            border-bottom: 1px solid var(--border-color);
        }

        .category-section {
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .category-title {
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        /* Orders */
        .date-filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .filter-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-download {
            background: var(--warning);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
        }

        .orders-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .order-item {
            border-left: 4px solid var(--primary);
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .order-status-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-pending { background: var(--warning); color: white; }
        .status-done { background: var(--success); color: white; }
        .status-rejected { background: var(--danger); color: white; }

        .order-status-select {
            padding: 0.3rem;
            border-radius: 8px;
            margin-left: 0.5rem;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        @media (max-width: 768px) {
            .admin-header { padding: 1rem; flex-direction: column; }
            .header-controls { width: 100%; justify-content: center; flex-wrap: wrap; }
            .form-group { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <a href="index.html" class="logo-link" id="logoLink">
            <h1>🛒 Kiosco</h1>
            <p>Panel de Administración</p>
        </a>
        <div class="header-controls">
            <div class="theme-toggle" id="themeToggle">
                <span>☀️</span>
                <div class="toggle-switch"></div>
                <span>🌙</span>
            </div>
            <a href="index.html" class="view-store-btn">🏪 Ver Tienda</a>
            <button id="logoutAdmin" class="logout-btn">🚪 Cerrar Sesión</button>
        </div>
    </header>

    <main class="admin-container">
        <!-- Login - Número oculto -->
        <div id="adminLogin" class="admin-login">
            <div class="login-icon">👑</div>
            <h2>Acceso Administrador</h2>
            <p>Ingresa tu número autorizado</p>
            <div class="input-group">
                <input type="password" id="adminPhone" placeholder="Número de teléfono" autocomplete="off">
            </div>
            <button id="loginAdminBtn" class="btn-login">🔐 Ingresar</button>
            <div class="hidden-number">
                🔒 Número registrado en el sistema
            </div>
        </div>

        <!-- Dashboard -->
        <div id="adminDashboard" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-info"><h3 id="totalProducts">0</h3><p>Productos</p></div></div>
                <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-info"><h3 id="totalOrders">0</h3><p>Pedidos</p></div></div>
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-info"><h3 id="totalRevenue">S/ 0</h3><p>Ingresos</p></div></div>
            </div>

            <div class="admin-section">
                <div class="section-tabs">
                    <button class="tab-btn active" data-tab="products">📦 Productos</button>
                    <button class="tab-btn" data-tab="categories">📂 Categorías</button>
                </div>
                
                <div id="productsTab" class="tab-content active">
                    <div class="form-group">
                        <select id="categorySelect" class="form-control"></select>
                        <input type="text" id="productName" placeholder="Nombre" class="form-control">
                        <input type="number" id="productPrice" placeholder="Precio S/" class="form-control" step="0.5">
                        <button id="addProductBtn" class="btn-success">➕ Agregar</button>
                    </div>
                    <div id="productsAdminList"></div>
                </div>
                
                <div id="categoriesTab" class="tab-content">
                    <div class="form-group">
                        <input type="text" id="newCategory" placeholder="Nueva categoría" class="form-control">
                        <button id="addCategoryBtn" class="btn-success">➕ Agregar</button>
                    </div>
                    <div id="categoriesAdminList"></div>
                </div>
            </div>

            <div class="admin-section">
                <h2>📊 Ventas en Tiempo Real</h2>
                <div class="date-filters">
                    <button id="filterDay" class="filter-btn active">📅 Hoy</button>
                    <button id="filterWeek" class="filter-btn">📆 Semana</button>
                    <button id="filterMonth" class="filter-btn">📈 Mes</button>
                    <button id="downloadReportBtn" class="btn-download">📥 Descargar Excel</button>
                </div>
                <div id="ordersList" class="orders-list"></div>
            </div>
        </div>
    </main>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button id="confirmYes" class="btn-success">Sí</button>
                <button id="confirmNo" class="btn-danger">No</button>
            </div>
        </div>
    </div>

    <script>
        // ============ FUNCIONES DB ============
        function getProducts() { return JSON.parse(localStorage.getItem('kiosco_products')) || {}; }
        function saveProducts(p) { localStorage.setItem('kiosco_products', JSON.stringify(p)); }
        function getOrders() { return JSON.parse(localStorage.getItem('kiosco_orders')) || []; }
        function saveOrders(o) { localStorage.setItem('kiosco_orders', JSON.stringify(o)); }
        
        // Validación con número oculto
        function isAdmin(phone) {
            const adminPhone = localStorage.getItem('kiosco_admin_phone');
            return phone.replace(/\s+/g, '').replace(/\+/g, '') === adminPhone.replace(/\s+/g, '').replace(/\+/g, '');
        }

        let currentOrders = [];
        let currentFilter = 'day';

        // DOM Elements
        const loginDiv = document.getElementById('adminLogin');
        const dashboardDiv = document.getElementById('adminDashboard');
        const loginBtn = document.getElementById('loginAdminBtn');
        const adminPhone = document.getElementById('adminPhone');
        const categorySelect = document.getElementById('categorySelect');
        const productsList = document.getElementById('productsAdminList');
        const categoriesList = document.getElementById('categoriesAdminList');
        const ordersList = document.getElementById('ordersList');
        const logoutBtn = document.getElementById('logoutAdmin');

        // Modal
        const confirmModal = document.getElementById('confirmModal');
        let pendingAction = null;
        function showConfirm(msg, callback) {
            document.getElementById('confirmMessage').textContent = msg;
            confirmModal.style.display = 'flex';
            pendingAction = callback;
        }
        document.getElementById('confirmYes').onclick = () => { if(pendingAction) pendingAction(); confirmModal.style.display = 'none'; };
        document.getElementById('confirmNo').onclick = () => { confirmModal.style.display = 'none'; };

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Login
        loginBtn.onclick = () => {
            const phone = adminPhone.value;
            if (isAdmin(phone)) {
                loginDiv.style.display = 'none';
                dashboardDiv.style.display = 'block';
                loadData();
                showToast('✅ Bienvenido Administrador', 'success');
            } else {
                showToast('❌ Número no autorizado', 'error');
                adminPhone.style.animation = 'shake 0.3s ease';
                setTimeout(() => adminPhone.style.animation = '', 300);
            }
        };

        logoutBtn.onclick = () => {
            dashboardDiv.style.display = 'none';
            loginDiv.style.display = 'block';
            adminPhone.value = '';
            showToast('Sesión cerrada', 'info');
        };

        function loadData() {
            loadCategoriesSelect();
            renderProducts();
            renderCategories();
            renderOrders(currentFilter);
            updateStats();
        }

        function updateStats() {
            const products = getProducts();
            const totalProducts = Object.values(products).reduce((s, c) => s + c.length, 0);
            const orders = getOrders();
            document.getElementById('totalProducts').textContent = totalProducts;
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('totalRevenue').textContent = `S/ ${orders.reduce((s, o) => s + o.total, 0).toFixed(2)}`;
        }

        function loadCategoriesSelect() {
            const products = getProducts();
            categorySelect.innerHTML = '';
            Object.keys(products).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                categorySelect.appendChild(opt);
            });
        }

        function renderProducts() {
            const products = getProducts();
            productsList.innerHTML = '';
            for (const [cat, items] of Object.entries(products)) {
                const div = document.createElement('div');
                div.className = 'category-section';
                div.innerHTML = `<div class="category-title">📁 ${cat}</div>`;
                items.forEach(p => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'product-item';
                    itemDiv.innerHTML = `<span><strong>${p.name}</strong> - S/ ${p.price}</span><button class="btn-danger delete-product" data-cat="${cat}" data-id="${p.id}" data-name="${p.name}">🗑️</button>`;
                    div.appendChild(itemDiv);
                });
                productsList.appendChild(div);
            }
            document.querySelectorAll('.delete-product').forEach(btn => {
                btn.onclick = () => {
                    const cat = btn.dataset.cat;
                    const id = parseInt(btn.dataset.id);
                    const name = btn.dataset.name;
                    showConfirm(`¿Eliminar "${name}"?`, () => {
                        let p = getProducts();
                        p[cat] = p[cat].filter(i => i.id !== id);
                        if (p[cat].length === 0) delete p[cat];
                        saveProducts(p);
                        loadData();
                        showToast(`✅ "${name}" eliminado`, 'success');
                    });
                };
            });
        }

        function renderCategories() {
            const products = getProducts();
            categoriesList.innerHTML = '';
            Object.keys(products).forEach(cat => {
                const div = document.createElement('div');
                div.className = 'category-item';
                div.innerHTML = `<span>📂 ${cat} (${products[cat].length})</span><button class="btn-danger delete-category" data-cat="${cat}">🗑️</button>`;
                categoriesList.appendChild(div);
            });
            document.querySelectorAll('.delete-category').forEach(btn => {
                btn.onclick = () => {
                    const cat = btn.dataset.cat;
                    showConfirm(`¿Eliminar "${cat}"?`, () => {
                        let p = getProducts();
                        delete p[cat];
                        saveProducts(p);
                        loadData();
                        showToast(`✅ "${cat}" eliminado`, 'success');
                    });
                };
            });
        }

        document.getElementById('addCategoryBtn').onclick = () => {
            const newCat = document.getElementById('newCategory').value.trim();
            if (newCat) {
                const p = getProducts();
                if (!p[newCat]) {
                    p[newCat] = [];
                    saveProducts(p);
                    loadData();
                    document.getElementById('newCategory').value = '';
                    showToast(`✅ "${newCat}" agregada`, 'success');
                } else showToast('Ya existe', 'error');
            }
        };

        document.getElementById('addProductBtn').onclick = () => {
            const cat = categorySelect.value;
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            if (cat && name && price > 0) {
                const p = getProducts();
                p[cat].push({ id: Date.now(), name, price });
                saveProducts(p);
                loadData();
                document.getElementById('productName').value = '';
                document.getElementById('productPrice').value = '';
                showToast(`✅ "${name}" agregado`, 'success');
            } else showToast('Completa campos', 'error');
        };

        function renderOrders(filter) {
            const orders = getOrders();
            const now = new Date();
            let filtered = [];
            if (filter === 'day') filtered = orders.filter(o => new Date(o.date).toDateString() === now.toDateString());
            else if (filter === 'week') { const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7); filtered = orders.filter(o => new Date(o.date) >= weekAgo); }
            else { const monthAgo = new Date(); monthAgo.setMonth(now.getMonth() - 1); filtered = orders.filter(o => new Date(o.date) >= monthAgo); }
            currentOrders = filtered;
            ordersList.innerHTML = '';
            if (!filtered.length) { ordersList.innerHTML = '<div style="text-align:center;padding:2rem;">📭 No hay pedidos</div>'; return; }
            filtered.forEach(o => {
                const statusClass = o.status === 'hecho' ? 'status-done' : (o.status === 'rechazado' ? 'status-rejected' : 'status-pending');
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;"><strong>📅 ${new Date(o.date).toLocaleString()}</strong><span class="order-status-badge ${statusClass}">${o.status}</span></div>
                    <div style="margin-top:0.5rem;"><strong>S/ ${o.total}</strong><select class="order-status-select" data-id="${o.id}" style="margin-left:0.5rem;"><option value="pendiente" ${o.status === 'pendiente' ? 'selected' : ''}>⏳ Pendiente</option><option value="hecho" ${o.status === 'hecho' ? 'selected' : ''}>✅ Hecho</option><option value="rechazado" ${o.status === 'rechazado' ? 'selected' : ''}>❌ Rechazado</option></select></div>
                    <div style="font-size:0.8rem;margin-top:0.5rem;">${o.items.map(i => `• ${i.name} x${i.quantity} = S/ ${(i.price*i.quantity).toFixed(2)}`).join('<br>')}</div>
                `;
                ordersList.appendChild(div);
            });
            document.querySelectorAll('.order-status-select').forEach(s => {
                s.onchange = () => {
                    let orders = getOrders();
                    orders = orders.map(o => o.id === parseInt(s.dataset.id) ? { ...o, status: s.value } : o);
                    saveOrders(orders);
                    renderOrders(filter);
                    showToast('Estado actualizado', 'success');
                };
            });
        }

        // Filtros
        document.getElementById('filterDay').onclick = () => { currentFilter = 'day'; renderOrders('day'); updateFilter('day'); };
        document.getElementById('filterWeek').onclick = () => { currentFilter = 'week'; renderOrders('week'); updateFilter('week'); };
        document.getElementById('filterMonth').onclick = () => { currentFilter = 'month'; renderOrders('month'); updateFilter('month'); };
        function updateFilter(active) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`filter${active === 'day' ? 'Day' : active === 'week' ? 'Week' : 'Month'}`).classList.add('active');
        }

        // ============ DESCARGAR EXCEL ============
        function downloadExcel() {
            if (!currentOrders.length) { showToast('No hay datos para descargar', 'error'); return; }
            
            // Crear tabla HTML para Excel
            let tableHtml = `
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>Reporte de Ventas - Kiosco</title>
                    <style>
                        th { background: #4f46e5; color: white; padding: 8px; }
                        td { padding: 8px; border: 1px solid #ddd; }
                        table { border-collapse: collapse; width: 100%; }
                    </style>
                </head>
                <body>
                    <h2>📊 REPORTE DE VENTAS - KIOSCO</h2>
                    <p><strong>Fecha de generación:</strong> ${new Date().toLocaleString('es-PE')}</p>
                    <p><strong>Período:</strong> ${currentFilter === 'day' ? 'Hoy' : currentFilter === 'week' ? 'Esta Semana' : 'Este Mes'}</p>
                    <br>
                    <table border="1">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Fecha y Hora</th>
                                <th>Productos</th>
                                <th>Total (S/)</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            currentOrders.forEach((order, index) => {
                const productos = order.items.map(i => `${i.name} x${i.quantity} (S/ ${(i.price*i.quantity).toFixed(2)})`).join('\n');
                const estadoTexto = order.status === 'pendiente' ? '⏳ Pendiente' : (order.status === 'hecho' ? '✅ Hecho' : '❌ Rechazado');
                tableHtml += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${new Date(order.date).toLocaleString('es-PE')}</td>
                        <td>${productos}</td>
                        <td style="text-align:right">S/ ${order.total.toFixed(2)}</td>
                        <td>${estadoTexto}</td>
                    </tr>
                `;
            });
            
            // Totales
            const totalIngresos = currentOrders.reduce((s, o) => s + o.total, 0);
            tableHtml += `
                        </tbody>
                        <tfoot>
                            <tr style="background: #f0f9ff;">
                                <td colspan="3"><strong>TOTALES</strong></td>
                                <td style="text-align:right"><strong>S/ ${totalIngresos.toFixed(2)}</strong></td>
                                <td><strong>${currentOrders.length} pedidos</strong></td>
                            </tr>
                        </tfoot>
                    </table>
                    <br>
                    <hr>
                    <p><small>Reporte generado automáticamente por Kiosco Admin</small></p>
                </body>
                </html>
            `;
            
            // Crear blob y descargar
            const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `reporte_ventas_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xls`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('📥 Reporte descargado en Excel', 'success');
        }

        document.getElementById('downloadReportBtn').onclick = downloadExcel;

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active');
            };
        });

        // ============ MODO CLARO/OSCURO ============
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            showToast(isDark ? '🌙 Modo oscuro activado' : '☀️ Modo claro activado', 'info');
        });

        // ============ ACTUALIZACIÓN EN TIEMPO REAL ============
        window.addEventListener('storage', () => { if (dashboardDiv.style.display === 'block') loadData(); });
        
        // Animación shake
        const style = document.createElement('style');
        style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
